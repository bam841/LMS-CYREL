<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLC.LMS - Log In</title>
    <style>
        /* inter font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        .root-frame { /* Main container for the entire page layout */
            display: flex;
            flex-direction: row;
            background: #FFF;
            height: 100vh; /* Make root-frame take full viewport height */
            padding: 10px 0; /* Add vertical padding for the panels */
            box-sizing: border-box; /* Include padding in the height calculation */
        }

        .left-panel-fx {
            position: absolute;
            width: 698px;
            height: auto;
        }

        .left-panel{
            /* Removed absolute positioning to allow flex layout */
            margin-top: 0; /* Handled by root-frame padding */
            margin-left: 5%; /* Horizontal offset */
            width: 650px;
            height: 95vh; 
            background: linear-gradient(180deg, #CD0F0F 0%, #7A1414 100%);
            border-radius: 35px;
            filter: drop-shadow(6px 6px 15.6px rgba(0, 0, 0, 0.25));
            overflow: hidden; /* Keeps the noise effect inside the rounded corners */
        }

        .left-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15; /* Adjust this to make the noise more or less visible */
            mix-blend-mode: overlay; /* Blends the noise nicely with the red background */
            pointer-events: none; /* Ensures the noise layer doesn't block mouse clicks */
        }


        .gradient-pop-effect {
            position: absolute;
            opacity: 0.5;
            top: 30%;
            left: 40%;
            width: 132.969px;
            height: 690.26px;
            transform: rotate(-90.142deg);
            border-radius: 690.26px;
            background: radial-gradient(50% 50% at 50% 50%, #D9D9D9 0%, rgba(217, 217, 217, 0.00) 100%);
            filter: blur(90px);
        }

        .hero-basic {
            position: absolute;
            top: 20%; /* Adjust this value (e.g., 50px, 15%) to control the vertical offset */
            left: 50%;
            transform: translateX(-50%);
            width: max-content; /* CSS equivalent to your original 'wrap-content' */
            height: max-content;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .text-content {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .title-wrapper {
            align-self: stretch;
            color: var(--Vibrant-Brand-Primary-50, #FDF0F0);
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 40px;
            line-height: 120%; /* 60px */
            letter-spacing: -1.5px;
        }

        #title{
            font-weight: 500;
        }

        #title-accent{
            color: var(--Vibrant-Brand-Primary-50, #FDF0F0);
            font-family: 'Inter', sans-serif;
            font-weight: 150;
            font-size: 40px;
            line-height: 120%;
            letter-spacing: -1.5px;
        }

        .subtitle {
            align-self: stretch;
            color: var(--Vibrant-Brand-Primary-200, #E8A0A0);
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 200;
            font-size: 28px;
            font-style: normal;
            line-height: 120%; /* 33.6px */
        }

        .bg-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* noise overlay */
        .bg-fill svg { 
            opacity: 0.45;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .bg-fill-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .bg-img {            
            filter: brightness(80%) contrast(150%) saturate(85%); 
            opacity: .4;
            width: 100%;
            height: auto;
            display: block; /* Removes the tiny invisible gap below inline images */   
        }

        .fx-bg {
            width: 636px;
            padding: 0 0.75px 0 1.508px;
            display: flex; /* Added to enable justify-content and align-items */
            justify-content: center;
            align-items: center;
        }

        .bfly-fx{
            position: absolute;
            margin-top: 35rem;
            right: 0rem;
        }

        /* input field bg */
        .form-log-in{
            /* layout */
            position: relative;
            width: 400px;
            height: 400px;
            padding: 1px 27px 43px 27px;
            
            /* flexbox for form elements */
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;

            /* style */
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.40);
            background: rgba(255, 255, 255, 0.40);
            box-shadow: 5px 7px 12px 0 rgba(0, 0, 0, 0.10);
            backdrop-filter: blur(12px);
        }

        .form-login-panel{
            flex: 1; /* Takes up remaining horizontal space */
            height: 100%; /* Matches the height of the left-panel (100% of root-frame's content height) */
            margin-top: 0rem; /* Aligns with the top of the left-panel */
            display: flex; /* Enable flexbox for internal layout */
            flex-direction: column; /* Stack children vertically */
            justify-content: flex-start; /* Push content to the bottom */
            align-items: center; /* Center content horizontally */
        }

        .hero-basic{
            position: relative;
        }

        .hero-basic h1{
            color: #878787;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-style: normal;
            font-size: 30px;
            line-height: 120%;
        }
</style>
</head>

                            </linearGradient>
                        </defs>
                    </svg>
                </div>

                <!-- noise overlay -->
                <div class="bg-fill-mask">
                    <img class ="bg-img" src="/assets/img/pages/index/bg-image.png" alt = "Background Image">
                </div>

                <!-- white light -->
                <div class ="gradient-pop-effect"></div>
                
                <div class="hero-basic">
                    <img src="assets/img/logo/clc-logo.png" alt = "logo">
                    <div class="text-content">
                        <div class="title-wrapper">
                            <span id="title">Cyrel Learning Center </span>
                            <span id="title-accent">LMS</span>
                        </div>
                        <span class="subtitle">Let's Get you Started</span>      
                    </div>
                </div>


            </div>

                <label for="email">Email</label>
                <input type="text" id="email" placeholder="e.g. clc-dagatan@gmail.com">
                
                <label for="email">Password</label>
                <input type="text" id="password" placeholder="e.g. clcdagatan2020">
