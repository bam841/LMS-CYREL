<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS-CYREL Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    
</head>
<body>

    <div class="dashboard-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-profile">
                <div class="profile-img-wrapper">
                    <img src="cyrel-removebg-preview.png" alt="Profile" id="sidebar_avatar">
                </div>
                <h2 id="admin_name">STUDENT NAME</h2>
                <p id="admin_role">STUDENT </p>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="active">
                    <span class="icon">📊</span> home
                </a>
                <a href="#">
                    <span class="icon">📁</span> view grades
                </a>
                <a href="#">
                    <span class="icon">⚙️</span> student schedules
                </a>
                <a href="#">
                    <span class="icon">👥</span> students clearance
                </a>
                
                <a href="#" class="logout-link">
                    <span class="icon">🚪</span> Logout
                </a>
            </nav>
        </aside>

        <main class="main-content">
            
            <header class="topbar">
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn">🔔</button>
                    <img src="placeholder-avatar.png" alt="Profile" class="topbar-avatar" id="topbar_avatar">
                </div>
            </header>

            <section class="hero-banner">
                <div class="hero-text">
                    <h1>ANNOUNCEMENTS</h1>
                   
                </div>
              
                  
                </div>
            </section>

           
        </main>
    </div>

</body>
</html>
